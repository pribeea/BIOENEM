<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOENEM - Cadastro</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Coluna da Esquerda - Gradiente Verde com Logo Centralizada -->
        <div class="illustration-side">
            <div class="illustration-content">
                <img src="logo.png" alt="BIOENEM Logo" class="site-logo">
            </div>
        </div>

        <!-- Coluna da Direita - Formulário de Cadastro -->
        <div class="login-side">
            <div class="login-container">

                <h1># BIOENEM</h1>
                <div class="subtitle">Biologia para o ENEM</div>

                <div class="login-label">Crie sua conta</div>

                <form id="cadastro-form">
                    <div class="form-group">
                        <label class="field-label">Nome completo</label>
                        <input type="text" class="input-field" id="nome" placeholder="Nome completo" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Email</label>
                        <input type="email" class="input-field" id="email" placeholder="nome@exemplo.com" required>
                    </div>
            
                    <div class="form-group">
                        <label class="field-label">Ano de ENEM</label>
                        <input type="number" class="input-field" id="ano_enem" placeholder="Ex: 2026" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Senha</label>
                        <input type="password" class="input-field" id="senha" placeholder="Mínimo 5 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Confirme sua senha</label>
                        <input type="password" class="input-field" id="confirmar-senha" placeholder="Digite a senha novamente" required>
                    </div>

                    <button type="button" class="btn-login" onclick="cadastrar()">Criar conta</button>
                </form>

                <div class="signup-link">       
                    <a href="/login-page">Faça login aqui</a>
                </div>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
