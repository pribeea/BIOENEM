<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOENEM - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Coluna da Esquerda - Gradiente Verde com Logo Centralizada -->
        <div class="illustration-side">
            <div class="illustration-content">
                <!-- SUA LOGO AQUI - grande e centralizada -->
                <img src="logo.png" alt="BIOENEM Logo" class="site-logo">
            </div>
        </div>

        <!-- Coluna da Direita - Formulário de Login Branco -->
        <div class="login-side">
            <div class="login-container">
                <h1># BIOENEM</h1>
                <div class="subtitle">Biologia para o ENEM</div>
                <div class="login-label">Faça login para continuar</div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="field-label">Email</label>
                        <input type="email" class="input-field" id="email" placeholder="nome@exemplo.com">
                    </div>

                    <div class="form-group">
                        <label class="field-label">Senha</label>
                        <input type="password" class="input-field" id="senha" placeholder="senha">
                    </div>

                    <button class="btn-login" onclick="login()">Entrar</button>
                </form>

                <div class="signup-link">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
                </div>

                <a href="#" class="forgot-password" onclick="recuperarSenha()">Esqueceu sua senha?</a>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>

        function recuperarSenha() {
            alert('Instruções de recuperação de senha enviadas para seu email!');
        }

        function cadastrar() {
            alert('Redirecionando para página de cadastro...');
        }
    </script>

</body>
</html>
