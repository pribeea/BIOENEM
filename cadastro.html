<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOENEM - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Coluna da Esquerda - Gradiente Verde com Logo Centralizada -->
        <div class="illustration-side">
            <div class="illustration-content">
                <img src="logo.png" alt="BIOENEM Logo" class="site-logo">
            </div>
        </div>

        <!-- Coluna da Direita - Formulário de Cadastro -->
        <div class="login-side">
            <div class="login-container">

                <h1># BIOENEM</h1>
                <div class="subtitle">Biologia para o ENEM</div>

                <div class="login-label">Crie sua conta</div>

                <form id="cadastro-form">
                    <div class="form-group">
                        <label class="field-label">Nome completo</label>
                        <input type="text" class="input-field" id="nome" placeholder="Nome completo" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Email</label>
                        <input type="email" class="input-field" id="email" placeholder="nome@exemplo.com" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Senha</label>
                        <input type="password" class="input-field" id="senha" placeholder="Mínimo 5 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Confirme sua senha</label>
                        <input type="password" class="input-field" id="confirmar-senha" placeholder="Digite a senha novamente" required>
                    </div>

                    <button type="submit" class="btn-login">Criar conta</button>
                </form>

                <div class="signup-link">
                    Já tem uma conta? <a href="index.html">Faça login aqui</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cadastro-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            
            // Validações
            if (!nome) {
                alert('Por favor, informe seu nome completo');
                return;
            }
            
            if (!email) {
                alert('Por favor, informe seu email');
                return;
            }
            
            if (senha.length < 5) {
                alert('A senha deve ter no mínimo 5 caracteres');
                return;
            }
            
            if (senha !== confirmarSenha) {
                alert('As senhas não conferem');
                return;
            }
            
            // Simular cadastro bem-sucedido
            alert(`Cadastro realizado com sucesso!\nBem-vindo(a), ${nome}!`);
            
            // Limpar formulário
            this.reset();
            
            // Redirecionar para o login
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
